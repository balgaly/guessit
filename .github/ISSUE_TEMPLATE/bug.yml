name: Bug Report
description: Report a bug or issue in GuessIt
title: "[Bug]: "
labels: ["type:bug", "priority:high"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible to help us fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
      placeholder: Clear description of the bug and its impact
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
      placeholder: Description of the expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Description of what actually occurred
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device information
      placeholder: |
        - Browser: Chrome 120.0.6099.109
        - OS: Windows 11
        - Device: Desktop
        - Screen size: 1920x1080
      value: |
        - Browser:
        - OS:
        - Device:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console Logs / Error Messages
      description: Any error messages or console logs (if available)
      placeholder: Paste error messages or stack traces here
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if applicable (drag and drop images here)
    validations:
      required: false
