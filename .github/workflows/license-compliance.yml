name: License Compliance

on:
  pull_request:
    branches: [master]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'

permissions:
  contents: read
  pull-requests: write

jobs:
  license-check:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check licenses
        run: |
          echo "Checking dependency licenses..."
          license-checker --summary --production --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;WTFPL"
        continue-on-error: false

      - name: Generate license report
        if: always()
        run: |
          echo "## License Compliance Report" > license-report.md
          echo "" >> license-report.md
          echo "### Allowed Licenses" >> license-report.md
          echo "- MIT" >> license-report.md
          echo "- Apache-2.0" >> license-report.md
          echo "- BSD-2-Clause, BSD-3-Clause" >> license-report.md
          echo "- ISC" >> license-report.md
          echo "- 0BSD" >> license-report.md
          echo "- CC0-1.0, Unlicense, WTFPL" >> license-report.md
          echo "" >> license-report.md
          echo "### Current Dependencies" >> license-report.md
          echo "\`\`\`" >> license-report.md
          license-checker --summary --production >> license-report.md || true
          echo "\`\`\`" >> license-report.md

      - name: Comment PR with license report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('license-report.md', 'utf8');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
