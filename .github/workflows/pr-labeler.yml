name: PR Auto-Labeler

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract ticket number and link issue
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;

            // Extract ticket number from PR title (supports [#42], [GI-042], #42)
            const ticketMatch = prTitle.match(/\[?#?(\d+|GI-\d+)\]?/i);

            if (ticketMatch) {
              const ticketId = ticketMatch[1];
              console.log(`Found ticket reference: ${ticketId}`);

              // Search for issue with this ticket ID
              try {
                const issues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  per_page: 100
                });

                // Find matching issue
                const matchingIssue = issues.data.find(issue =>
                  issue.title.includes(ticketId) ||
                  issue.labels.some(label => label.name === `ticket:${ticketId}`)
                );

                if (matchingIssue) {
                  console.log(`Found matching issue #${matchingIssue.number}`);

                  // Add comment linking to the issue
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `🔗 Linked to issue #${matchingIssue.number}`
                  });

                  // Copy labels from issue to PR
                  if (matchingIssue.labels.length > 0) {
                    const labelNames = matchingIssue.labels.map(l => l.name);
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNumber,
                      labels: labelNames
                    });
                    console.log(`Applied labels: ${labelNames.join(', ')}`);
                  }
                } else {
                  console.log('No matching issue found');
                }
              } catch (error) {
                console.error('Error searching for issue:', error);
              }
            } else {
              console.log('No ticket reference found in PR title');
            }
